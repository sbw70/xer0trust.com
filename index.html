/* Top-left links */
.links {
  position: fixed;
  top: 30px;
  left: 30px;
  display: grid;
  gap: 8px;
  z-index: 1;
}

/* Link styling */
.links a {
  display: inline-block;
  padding: 10px 12px;
  font-size: 0.75rem;
  text-decoration: none;
  color: #fff;
  font-weight: 600;
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 12px;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(6px);
  transition: 0.2s ease;
}

.links a:hover {
  background: rgba(255,255,255,0.12);
}

/* Mobile adjustments */
@media (max-width: 600px) {
  .links {
    top: 20px;
    left: 20px;
  }

    font-size: 0.7rem;
    padding: 8px 10px;
